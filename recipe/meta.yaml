{% set name = "sceptre-cmd-resolver" %}
{% set version = "1.2.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sceptre-cmd-resolver-{{ version }}.tar.gz
  sha256: b748f5023a4f84be6e34439dea4be53f641e3b474640ab9584f0eeb07ebc2f1c

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - pytest-runner >=3
    - python {{ python_min }}
  run:
    - packaging ==16.8
    - python >={{ python_min }}

test:
  imports:
    - resolver
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Sceptre/sceptre-resolver-cmd
  summary: Sceptre resolver to execute generic shell commands
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - admax18
    - mxr-conda
